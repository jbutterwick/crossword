# Crosstui color themes.
#
# Edit or add your own — each [[theme]] needs a name and nine hex colors.
# The UI maps these onto roles like so:
#   square background = fg, letters = bg, black squares = surface,
#   cursor cell = red, current-word cell = yellow, titles/borders = blue,
#   clue numbers = magenta, selection = yellow, statuses = green/yellow/red.

[[theme]]
name = "Classic"
bg = "#1e1e1e"
fg = "#e0e0e0"
surface = "#3a3a3a"
muted = "#808080"
red = "#ff6b6b"
green = "#5fd75f"
yellow = "#e5c07b"
blue = "#5fafff"
magenta = "#d75fd7"

